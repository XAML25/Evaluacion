<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${materiaForm.id == null} ? 'Nueva Materia' : 'Editar Materia'">Formulario de Materia</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); width: 400px; }
        h2 { margin-top: 0; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; }
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; text-align: center; flex: 1; font-size: 15px; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 th:text="${materiaForm.id == null} ? 'Agregar Materia' : 'Modificar Materia'">Formulario</h2>

    <form th:action="${materiaForm.id == null} ? @{/materias} : @{/materias/{id}(id=${materiaForm.id})}"
          th:object="${materiaForm}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label for="nombre">Nombre de la Materia:</label>
            <input type="text" id="nombre" th:field="*{nombre}" required placeholder="Ej. Ingeniería de Requisitos" />
        </div>

        <div class="form-group">
            <label for="codigo">Código / Siglas:</label>
            <input type="text" id="codigo" th:field="*{codigo}" required placeholder="Ej. IR-01" />
        </div>

        <div class="form-group">
            <label for="creditos">Créditos:</label>
            <input type="number" id="creditos" th:field="*{creditos}" min="1" max="10" required />
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-success">Guardar</button>
            <a th:href="@{/materias}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

</body>
</html>
